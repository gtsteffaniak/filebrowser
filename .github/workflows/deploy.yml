name: Build and Deploy

on:
  push:
    branches: [main, uat, dev]

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: acorntoolsregistry.azurecr.io
  IMAGE: acorndrive

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set environment from branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "CONTAINER_APP=acorndrive-prod" >> $GITHUB_ENV
            echo "CONFIG_FILE=config.prod.yaml" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "uat" ]; then
            echo "ENV=uat" >> $GITHUB_ENV
            echo "CONTAINER_APP=acorndrive-uat" >> $GITHUB_ENV
            echo "CONFIG_FILE=config.uat.yaml" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "CONTAINER_APP=acorndrive-dev" >> $GITHUB_ENV
            echo "CONFIG_FILE=config.dev.yaml" >> $GITHUB_ENV
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name acorntoolsregistry

      - name: Build and push Docker image
        run: |
          docker build -t $REGISTRY/$IMAGE:$ENV -f _docker/Dockerfile --build-arg CONFIG_FILE=$CONFIG_FILE .
          docker push $REGISTRY/$IMAGE:$ENV

      - name: Deploy to Container App
        run: |
          az containerapp registry set \
            --name $CONTAINER_APP \
            --resource-group rg-acornDrive \
            --server $REGISTRY \
            --identity system
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group rg-acornDrive \
            --image $REGISTRY/$IMAGE:$ENV
