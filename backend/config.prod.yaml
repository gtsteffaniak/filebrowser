server:
  port: 8080
  baseURL: "/"
  externalUrl: "https://drive.acorn.tools"
  database: "/database/filebrowser.db"
  sources:
    - path: "/srv"

auth:
  key: "GW8okZkm/d3Wt6PiqeOeM36WuGuuVUjK" # MUST be exactly 32 bytes for AES-256
  tokenExpirationHours: 8
  methods:
    chainfs:
      enabled: true
      apiBaseUrl: "https://nansendev.azurewebsites.net"   # B2C stays on DEV until further notice
      clientSecret: ""
      createUser: true
      adminClaim: "roles"
      adminClaimValue: "admin"
