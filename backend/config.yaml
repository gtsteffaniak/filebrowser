server:
  port: 80
  baseURL:  "/"
  logging:
    - levels: "info|warning|error"
  sources:
    - path: "/srv"
userDefaults:
  listingOptions:
    deleteWithoutConfirming: false          # delete files without confirmation
    dateFormat: false                       # when false, relative date; when true, exact timestamp
    showHidden: false                       # show hidden files (. on Windows incl. hidden)
    quickDownload: false                    # icon to download in one click
    showSelectMultiple: false               # select multiple files on desktop
    deleteAfterArchive: true                # delete source files after archives
    viewMode: "normal"                      # normal, list, grid, compact
    singleClick: false                      # open dir on single click; middle = new tab
    gallerySize: 3                          # 0–9 gallery thumbnail size
  thumbnailOptions:
    disablePreviewExt: ""                   # extensions to disable preview for (space-separated)
    image: true                             # thumbnail preview for images
    video: true                             # thumbnail preview for video
    audio: true                             # thumbnail preview for audio
    motionVideoPreview: true                # multi-frame hover preview for videos
    office: true                            # thumbnail preview for office files
    popup: true                             # larger hover popup on thumbnail
    folder: true                            # thumbnail preview for folders
    models: true                            # live preview for 3D models
  sidebarOptions:
    disableQuickToggles: false              # quick toggles in sidebar
    disableHideSidebar: false               # disallow hiding sidebar in preview/editor
    hideSidebarFileActions: false           # hide file actions in sidebar
    hideFilesInTree: false                  # directories only in tree when true
    showToolsInSidebar: true                # show "tool" category links in sidebar
    stickySidebar: true                     # keep sidebar open when navigating
  searchOptions:
    disableSearchOptions: false             # search bar option controls
  fileViewerOptions:
    editorQuickSave: false                  # quick save button in editor
    preferEditorForMarkdown: false          # editor first vs Markdown viewer
    disableViewingExt: ""                   # extensions to disable viewing for
    disableOnlyOfficeExt: ".md .txt .pdf .html .xml"   # OnlyOffice-disabled extensions
    debugOffice: false                      # OnlyOffice debug
    autoplayMedia: true                     # autoplay media in preview
    defaultMediaPlayer: false               # OS default player vs HTML5
  themeLanguage:
    darkMode: true                          # dark mode default
    themeColor: "var(--blue)"
    customTheme: ""                         # theme name from custom themes config
  account:
    permissions:
      api: false                            # api access
      admin: false                          # admin access
      modify: false                         # modifying files
      share: false                          # sharing files
      realtime: false                       # realtime updates
      delete: false                         # deleting files
      create: false                         # creating / uploading files
      download: true                        # downloading (default true)
    lockPassword: false                     # disallow password change
    disableSettings: false                  # disallow settings page
  admin:
    disableUpdateNotifications: false       # update banner for admins
