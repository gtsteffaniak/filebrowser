http:
  port: 80
  baseURL:  "/"
server:
  logging:
    - levels: "info|error|warning|debug"
      apiFilter: 'disabled'
  sources:
    - path: "../frontend/tests/playwright-files"
      config:
        defaultPermissions:
          view: true
          download: true
          modify: true
          create: true

auth:
  methods:
    noauth: true

frontend:
  name: "Graham's Filebrowser"
  disableDefaultLinks: true
  externalLinks:
    - text: "A playwright test"
      url: "https://playwright.dev/"
      title: "Playwright"
  styling:
    disableEventThemes: true

userDefaults:
  listing:
    showHidden: true
  preview:
    image: true
    popup: true
    video: true
    audio: true
    office: true
    models: true
    highQuality: true
